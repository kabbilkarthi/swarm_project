<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kabbil | customer</title>
    <style>
        body {
            font-family: consolas;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: #f9f9f9;
            color: #333;
            text-align: center; /* centers headings + inline-block elements */
        }
        form {
            display: inline-block; /* keeps fields left-aligned inside */
            text-align: left; /* align labels/inputs properly inside form */
            margin-top: 20px;
            background: #fff;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0px 2px 6px rgba(0,0,0,0.15);
        }
        #banner {
            width: 100%;    
            height: 300px;
            object-fit: cover;
        }
        .submit-container {
            text-align: center;
        }
        .btn-container {
            text-align: center; /* centers the button */
            margin-top: 20px;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
        }
        .btn:hover {
            background-color: #45a049;
        }
        footer {
            text-align: center;
            padding: 15px;
            background: #222;
            color: white;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <img id="banner" src="/static/banner.jpg" alt="Banner Image" height="880" width="1200">
    <h2>User Details</h2>

    <!-- Centered form -->
    <form action="/submit_customer_details" method="POST">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="user_type">Profession/Role:</label><br>
        <select id="user_type" name="user_type">
            <option value="Visitor" selected>Visitor</option>
            <option value="Student">Student</option>
            <option value="Recruiter">Recruiter</option>
            <option value="IT Engineer">IT Engineer</option>
        </select><br><br>

        <div class="submit-container">
            <button type="submit">Submit</button><br><br>
        </div>

        <div class="btn-container">
            <a href="/" class="btn">Go back to home</a>
        </div>
    </form>

    <footer>
        <p>© 2025 Kabbil | Built with Flask & MySQL</p>
    </footer>
</body>
</html>
