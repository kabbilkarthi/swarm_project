<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabbil | Certifications</title>
    <style>
        body {
                font-family: consolas;
                margin: 0;
                padding: 0;
                line-height: 1.6;
                background-color: #f9f9f9;
                color: #333;
        }

        section {
            max-width: 900px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        #banner {
            width: 100%;    
            height: 300px;
            object-fit: cover;
        }
        .btn-container {
            text-align: center; /* centers the button */
            margin-top: 20px;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
        }
        .btn:hover {
            background-color: #45a049;
        }
        .submit-container {
            text-align: center;
        }
        footer {
                text-align: center;
                padding: 15px;
                background: #222;
                color: white;
                margin-top: 30px;
        }
    </style>
</head>
<body>
    <img id="banner" src="/static/banner.jpg" alt="Banner Image">

<section>
    <h2>Certifications</h2>
    {% for cert in certification_details %}
        <div class="cert">
            <h3>{{ cert.id }}. {{ cert.name }}</h3>
            {% if cert.url %}
                <p><a href="{{ cert.url }}" target="_blank">🔗 View Certificate</a></p>
            {% endif %}
        </div>
    {% endfor %}
</section>
    <div class="btn-container">
        <a href="/" class="btn">Go back to home</a>
    </div>
    <footer>
            <p>© 2025 Kabbil | Built with Flask & MySQL</p>
    </footer>
</body>
</html>
